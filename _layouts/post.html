---
layout: default
---

<article class="post">
  <header class="post-header">
    <p class="eyebrow">Post</p>
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y.%m.%d" }}</time>
      {% if page.tags %}
        <span>{{ page.tags | join: ", " }}</span>
      {% endif %}
    </div>
  </header>

  <div class="content">
    {{ content }}
  </div>
</article>
